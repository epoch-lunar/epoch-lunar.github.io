# Static frontend — Worker + Assets (epochlunar-com).
# Deployed by Cloudflare’s Workers Builds / git integration from repo root.
# Rust API Worker lives in backend/ (name: epoch-worker) and uses GitHub Actions.

name = "epochlunar-com"
compatibility_date = "2026-04-05"

[assets]
directory = "frontend"

[observability]
enabled = true
