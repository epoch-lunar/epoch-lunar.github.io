name: Deploy staging

# Pushes to `staging` update *-staging workers only. Production (main / epochlunar.com) is unchanged.
# Staging URLs (after first deploy):
#   https://epochlunar-com-staging.<your-subdomain>.workers.dev
#   API: https://epoch-worker-staging.<your-subdomain>.workers.dev

on:
  push:
    branches: [staging]
    paths:
      - "backend/**"
      - "frontend/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install worker-build
        run: cargo install worker-build

      - name: Deploy API Worker (staging)
        working-directory: backend
        run: |
          npm ci
          npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy static site (staging)
        run: cd backend && npx wrangler deploy --config ../wrangler.toml --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
