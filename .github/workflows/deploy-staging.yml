name: Deploy staging

# Updates *-staging workers only. Production (main / epochlunar.com) is unchanged.
# Staging URLs (after first deploy):
#   https://epochlunar-com-staging.<your-subdomain>.workers.dev
#   API: https://epoch-worker-staging.<your-subdomain>.workers.dev
#
# Triggers:
#   • Push to branch `staging` — e.g. merge a PR into `staging`, or push directly.
#   • Pull request targeting `main` — each push to the PR redeploys staging (same URLs; latest PR wins).
#   • workflow_dispatch — manual run from Actions tab.
#
# Fork PRs: deploy job is skipped (GitHub does not expose secrets to workflows from forks).

on:
  push:
    branches: [staging]
    paths:
      - "backend/**"
      - "frontend/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-staging.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

jobs:
  deploy:
    # Same-repo PRs only — secrets are unavailable for fork PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install worker-build
        run: cargo install worker-build

      - name: Deploy API Worker (staging)
        working-directory: backend
        run: |
          npm ci
          npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy static site (staging)
        run: cd backend && npx wrangler deploy --config ../wrangler.toml --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
